<!DOCTYPE html><html lang="es" style="--vp-cream: #F7E9E4; --vp-cream-soft: #F0D8D0;"><head>


<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Viena Pets — Diseño de autor para tu mejor amigo</title>
<link rel="icon" type="image/png" href="assets/favicon-viena.png">
<meta name="description" content="Arneses, correas y portabolsas con diseños exclusivos diseñados en España. Edición limitada SS26.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&amp;family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&amp;family=Jost:wght@300;400;500;600&amp;family=JetBrains+Mono:wght@400&amp;display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles/tokens.css">

<style>
  @keyframes vpFadeIn { from { opacity: 0; transform: translateY(8px);} to { opacity: 1; transform: none; } }
  @keyframes vpTicker { from { transform: translateX(0);} to { transform: translateX(-33.333%);} }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: var(--vp-cream); }
  ::-webkit-scrollbar-thumb { background: var(--vp-sand); }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="scripts/data.jsx" data-plugins="transform-react-jsx-source" data-filename="scripts/data.jsx"></script>
<script type="text/babel" src="scripts/shared.jsx" data-plugins="transform-react-jsx-source" data-filename="scripts/shared.jsx"></script>
<script type="text/babel" src="scripts/home.jsx" data-plugins="transform-react-jsx-source" data-filename="scripts/home.jsx"></script>
<script type="text/babel" src="scripts/home-moderna.jsx" data-plugins="transform-react-jsx-source" data-filename="scripts/home-moderna.jsx"></script>
<script type="text/babel" src="scripts/pages.jsx" data-plugins="transform-react-jsx-source" data-filename="scripts/pages.jsx"></script>
</head>
<body data-cc-id="cc-1" style="cursor: crosshair; font-family: Jost;">
<div id="root"></div>

<script type="text/babel" data-plugins="transform-react-jsx-source" data-filename="inline-5">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "heroModel": "capri",
  "heroStyle": "single",
  "paletteMode": "cream",
  "variant": "boutique"
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweaks] = React.useState(() => {
    // Allow URL ?v=moderna to override for side-by-side canvas
    const urlV = new URLSearchParams(window.location.search).get("v");
    try {
      const stored = JSON.parse(localStorage.getItem("vp_tweaks") || "null");
      const base = stored || TWEAK_DEFAULTS;
      return urlV ? { ...base, variant: urlV } : base;
    } catch { return urlV ? { ...TWEAK_DEFAULTS, variant: urlV } : TWEAK_DEFAULTS; }
  });
  const [editMode, setEditMode] = React.useState(false);
  const { route } = useRoute();

  React.useEffect(() => { localStorage.setItem("vp_tweaks", JSON.stringify(tweaks)); }, [tweaks]);

  React.useEffect(() => {
    const onMsg = (e) => {
      if (e.data?.type === "__activate_edit_mode") setEditMode(true);
      if (e.data?.type === "__deactivate_edit_mode") setEditMode(false);
    };
    window.addEventListener("message", onMsg);
    window.parent.postMessage({ type: "__edit_mode_available" }, "*");
    return () => window.removeEventListener("message", onMsg);
  }, []);

  const updateTweak = (k, v) => {
    setTweaks((prev) => {
      const next = { ...prev, [k]: v };
      window.parent.postMessage({ type: "__edit_mode_set_keys", edits: { [k]: v } }, "*");
      return next;
    });
  };

  // apply palette mode on root
  React.useEffect(() => {
    const root = document.documentElement;
    const modes = {
      cream:  { "--vp-cream": "#F2E9DC", "--vp-cream-soft": "#EAE0D0" },
      green:  { "--vp-cream": "#ECEBD8", "--vp-cream-soft": "#DFE2C5" },
      pink:   { "--vp-cream": "#F7E9E4", "--vp-cream-soft": "#F0D8D0" },
      yellow: { "--vp-cream": "#F7F0D8", "--vp-cream-soft": "#F0E4BA" },
    };
    const m = modes[tweaks.paletteMode] || modes.cream;
    Object.entries(m).forEach(([k, v]) => root.style.setProperty(k, v));
  }, [tweaks.paletteMode]);

  // Route dispatcher
  let page;
  if (route === "/" || route === "") page = tweaks.variant === "moderna"
    ? <HomePageModerna heroModelId={tweaks.heroModel} />
    : <HomePage heroModelId={tweaks.heroModel} heroStyle={tweaks.heroStyle} paletteMode={tweaks.paletteMode} />;
  else if (route.startsWith("/tienda")) page = <ShopPage />;
  else if (route.startsWith("/producto/")) {
    const id = route.split("/")[2];
    page = <ProductPage modelId={id} />;
  }
  else if (route === "/checkout") page = <CheckoutPage />;
  else if (route === "/historia") page = <HistoryPage />;
  else if (route === "/modelos") page = <ModelsPage />;
  else if (route === "/probador") page = <ProbadorPage />;
  else if (route === "/guia-de-tallas") page = <GuiaDeTallasPage />;
  else page = <HomePage heroModelId={tweaks.heroModel} heroStyle={tweaks.heroStyle} />;

  return (
    <>
      <AnnouncementBar />
      <Navbar />
      <PageFade routeKey={route}>{page}</PageFade>
      <Footer />
      <CartDrawer />
      {editMode && <TweaksPanel tweaks={tweaks} update={updateTweak} />}
    </>
  );
}

function TweaksPanel({ tweaks, update }) {
  return (
    <div style={{
      position: "fixed", right: 20, bottom: 20, width: 300, zIndex: 200,
      background: "var(--vp-paper)", border: "1px solid var(--vp-brown)",
      padding: 20, boxShadow: "0 20px 50px rgba(42,29,18,.2)", fontFamily: "var(--font-body)"
    }}>
      <div className="vp-eyebrow" style={{ marginBottom: 4 }}>Tweaks</div>
      <div className="vp-serif" style={{ fontSize: 20, color: "var(--vp-brown)", marginBottom: 14 }}>Ajusta la web</div>

      <Row label="Variante">
        <div style={{ display: "flex", gap: 6 }}>
          {[{k: "boutique", l: "Boutique"}, {k: "moderna", l: "Moderna"}].map((v) => (
            <button key={v.k} onClick={() => update("variant", v.k)} style={{
              flex: 1, padding: "8px 0", border: `1px solid var(--vp-brown)`,
              background: tweaks.variant === v.k ? "var(--vp-brown)" : "transparent",
              color: tweaks.variant === v.k ? "var(--vp-paper)" : "var(--vp-brown)",
              cursor: "pointer", fontSize: 10, letterSpacing: ".18em", textTransform: "uppercase",
            }}>{v.l}</button>
          ))}
        </div>
      </Row>

      <Row label="Modelo del hero">
        <div style={{ display: "flex", gap: 6 }}>
          {VP_MODELS.map((m) => (
            <button key={m.id} onClick={() => update("heroModel", m.id)} style={{
              flex: 1, padding: "8px 0", border: `1px solid var(--vp-brown)`,
              background: tweaks.heroModel === m.id ? "var(--vp-brown)" : "transparent",
              color: tweaks.heroModel === m.id ? "var(--vp-paper)" : "var(--vp-brown)",
              cursor: "pointer", fontSize: 10, letterSpacing: ".18em", textTransform: "uppercase",
            }}>{m.name}</button>
          ))}
        </div>
      </Row>

      <Row label="Estilo del hero">
        <div style={{ display: "flex", gap: 6 }}>
          {[{k: "single", l: "Foto única"}, {k: "mosaic", l: "Mosaico"}].map((s) => (
            <button key={s.k} onClick={() => update("heroStyle", s.k)} style={{
              flex: 1, padding: "8px 0", border: `1px solid var(--vp-brown)`,
              background: tweaks.heroStyle === s.k ? "var(--vp-brown)" : "transparent",
              color: tweaks.heroStyle === s.k ? "var(--vp-paper)" : "var(--vp-brown)",
              cursor: "pointer", fontSize: 10, letterSpacing: ".18em", textTransform: "uppercase",
            }}>{s.l}</button>
          ))}
        </div>
      </Row>

      <Row label="Paleta">
        <div style={{ display: "flex", gap: 6 }}>
          {[
            {k: "cream", c: "#F2E9DC"},
            {k: "green", c: "#DFE2C5"},
            {k: "pink",  c: "#F0D8D0"},
            {k: "yellow",c: "#F0E4BA"},
          ].map((p) => (
            <button key={p.k} onClick={() => update("paletteMode", p.k)} style={{
              width: 40, height: 32, background: p.c,
              border: tweaks.paletteMode === p.k ? "2px solid var(--vp-brown)" : "1px solid rgba(74,46,28,.3)",
              cursor: "pointer", padding: 0,
            }} />
          ))}
        </div>
      </Row>
    </div>
  );
}

function Row({ label, children }) {
  return (
    <div style={{ marginBottom: 14 }}>
      <div style={{ fontSize: 10, letterSpacing: ".18em", textTransform: "uppercase", color: "var(--vp-ink-muted)", marginBottom: 8 }}>{label}</div>
      {children}
    </div>
  );
}

function RootApp() {
  return (
    <RouteProvider>
      <CartProvider>
        <App />
      </CartProvider>
    </RouteProvider>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<RootApp />);
</script>


</body></html>
